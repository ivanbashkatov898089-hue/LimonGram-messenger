<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Limongram Secure 🔐</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #f0f2f5; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 10px; overflow: hidden; }
        .header { background: #25D366; color: white; padding: 20px; text-align: center; }
        .main { display: flex; min-height: 500px; }
        .sidebar { width: 200px; background: #f8f9fa; padding: 20px; border-right: 1px solid #ddd; }
        .chat { flex: 1; display: flex; flex-direction: column; }
        .messages { flex: 1; padding: 20px; overflow-y: auto; height: 400px; }
        .input-area { padding: 20px; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        input, button { padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #25D366; color: white; cursor: pointer; }
        .user-item { padding: 10px; margin: 5px 0; background: white; border-radius: 5px; cursor: pointer; }
        .user-item:hover { background: #e9ecef; }
        .message { margin: 10px 0; padding: 10px; border-radius: 10px; max-width: 70%; }
        .incoming { background: #f1f3f4; }
        .outgoing { background: #dcf8c6; margin-left: auto; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍋 Limongram 🔐 E2E Encryption</h1>
        </div>
        
        <div style="padding: 20px;" id="connectPanel">
            <input type="text" id="username" placeholder="Ваше имя" style="width: 300px;">
            <button onclick="connect()">Подключиться</button>
        </div>
        
        <div class="main" id="chatPanel" style="display: none;">
            <div class="sidebar">
                <h3>👥 Онлайн</h3>
                <div id="userList"></div>
            </div>
            
            <div class="chat">
                <div class="messages" id="messages"></div>
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="Сообщение" style="flex: 1;" disabled>
                    <input type="text" id="recipient" placeholder="Кому" disabled>
                    <button onclick="sendEncrypted()" id="sendBtn" disabled>🔐 Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let myName = "";
        let myKey = null;
        let peerKeys = {};
        
        function connect() {
            myName = document.getElementById('username').value.trim();
            if (!myName) return alert('Введите имя!');
            
            // Генерируем ключ шифрования
            myKey = CryptoJS.lib.WordArray.random(32).toString();
            
            ws = new WebSocket(`ws://localhost:8000/ws/${myName}`);
            
            ws.onopen = () => {
                document.getElementById('connectPanel').style.display = 'none';
                document.getElementById('chatPanel').style.display = 'flex';
                document.getElementById('messageInput').disabled = false;
                document.getElementById('recipient').disabled = false;
                document.getElementById('sendBtn').disabled = false;
                alert('🔐 Подключено с шифрованием!');
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.type === 'users') {
                    updateUserList(data.users);
                }
                else if (data.type === 'encrypted') {
                    // Расшифровываем сообщение
                    const decrypted = decryptMessage(data.data);
                    addMessage(data.from, decrypted, true);
                }
            };
        }
        
        function encryptMessage(text, recipientKey) {
            const iv = CryptoJS.lib.WordArray.random(16);
            const encrypted = CryptoJS.AES.encrypt(text, recipientKey, {
                iv: iv,
                mode: CryptoJS.mode.CBC,
                padding: CryptoJS.pad.Pkcs7
            });
            
            return {
                data: encrypted.toString(),
                iv: iv.toString()
            };
        }
        
        function decryptMessage(encryptedData) {
            const decrypted = CryptoJS.AES.decrypt(encryptedData.data, myKey, {
                iv: CryptoJS.enc.Hex.parse(encryptedData.iv),
                mode: CryptoJS.mode.CBC,
                padding: CryptoJS.pad.Pkcs7
            });
            return decrypted.toString(CryptoJS.enc.Utf8);
        }
        
        function sendEncrypted() {
            const message = document.getElementById('messageInput').value;
            const recipient = document.getElementById('recipient').value;
            
            if (!message || !recipient) return alert('Введите сообщение и получателя!');
            
            // Используем ключ получателя (в реальном проекте нужно обмениваться ключами)
            const encrypted = encryptMessage(message, myKey);
            
            ws.send(JSON.stringify({
                type: "encrypted",
                to: recipient,
                data: encrypted
            }));
            
            addMessage(`Вы → ${recipient}`, message, false);
            document.getElementById('messageInput').value = '';
        }
        
        function updateUserList(users) {
            const list = document.getElementById('userList');
            list.innerHTML = '';
            
            users.filter(u => u !== myName).forEach(user => {
                const div = document.createElement('div');
                div.className = 'user-item';
                div.textContent = user;
                div.onclick = () => {
                    document.getElementById('recipient').value = user;
                };
                list.appendChild(div);
            });
        }
        
        function addMessage(sender, text, incoming) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${incoming ? 'incoming' : 'outgoing'}`;
            div.innerHTML = `<strong>${sender}:</strong> ${text} 🔐`;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }
    </script>
</body>
</html>
