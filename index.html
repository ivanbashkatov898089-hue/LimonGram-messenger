<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Limongram — защищенный мессенджер</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        :root {
            --primary: #25D366;
            --primary-dark: #128C7E;
            --secondary: #34B7F1;
            --bg: #f0f2f5;
            --sidebar: #ffffff;
            --message-in: #ffffff;
            --message-out: #dcf8c6;
            --text: #111b21;
            --text-light: #667781;
            --shadow: 0 2px 10px rgba(0,0,0,0.08);
            --border: #e9edef;
            --hover: #f5f6f6;
            --danger: #f44336;
            --success: #4CAF50;
            --warning: #ff9800;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
        }

        .app {
            width: 100%;
            max-width: 1300px;
            height: 100vh;
            background: white;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            background: var(--primary);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo i {
            font-size: 24px;
        }

        .logo h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .online-status {
            background: rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .auth-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
        }

        .auth-card {
            background: white;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .auth-card i {
            font-size: 50px;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .auth-card h2 {
            font-size: 24px;
            color: var(--text);
            margin-bottom: 8px;
        }

        .auth-card p {
            color: var(--text-light);
            margin-bottom: 25px;
            font-size: 14px;
        }

        .auth-input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .auth-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.1);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .auth-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .main-screen {
            flex: 1;
            display: flex;
            background: var(--bg);
            position: relative;
        }

        .sidebar {
            width: 100%;
            max-width: 350px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 10;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }

        .sidebar.active {
            transform: translateX(0);
        }

        @media (min-width: 768px) {
            .sidebar {
                position: relative;
                transform: translateX(0);
            }
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            font-weight: 600;
        }

        .user-info h4 {
            font-size: 15px;
            color: var(--text);
            margin-bottom: 2px;
        }

        .user-info p {
            font-size: 12px;
            color: var(--text-light);
        }

        .search-box {
            margin-top: 15px;
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 14px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 12px 10px 40px;
            border: 1px solid var(--border);
            border-radius: 25px;
            font-size: 14px;
            background: var(--hover);
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 12px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chat-item:hover {
            background: var(--hover);
        }

        .chat-item.active {
            background: var(--hover);
            border-left: 3px solid var(--primary);
        }

        .chat-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
            position: relative;
            flex-shrink: 0;
        }

        .chat-avatar.online::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 10px;
            height: 10px;
            background: #4ade80;
            border-radius: 50%;
            border: 2px solid white;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
        }

        .chat-name .fa-lock {
            color: var(--success);
            font-size: 10px;
        }

        .chat-name .fa-exclamation-triangle {
            color: var(--warning);
            font-size: 10px;
        }

        .chat-preview {
            font-size: 12px;
            color: var(--text-light);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-time {
            font-size: 10px;
            color: var(--text-light);
            flex-shrink: 0;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            width: 100%;
        }

        .chat-header {
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .menu-toggle {
            display: block;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: var(--hover);
            border: none;
            color: var(--text);
            cursor: pointer;
            margin-right: 10px;
        }

        @media (min-width: 768px) {
            .menu-toggle {
                display: none;
            }
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .chat-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            flex-shrink: 0;
        }

        .chat-header-text {
            min-width: 0;
        }

        .chat-header-text h3 {
            font-size: 16px;
            color: var(--text);
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-header-text p {
            font-size: 12px;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .chat-header-text p i.fa-lock {
            color: var(--success);
        }

        .chat-header-text p i.fa-exclamation-triangle {
            color: var(--warning);
        }

        .chat-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--hover);
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .action-btn:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.05);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .messages-container {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHZpZXdCb3g9IjAgMCA0MCA0MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cGF0aCBkPSJNMjAgMjBhMTAgMTAgMCAwIDEgMjAgMCAxMCAxMCAwIDAgMS0yMCAweiIgZmlsbD0icmdiYSgwLDAsMCwwLjAyKSIvPjwvc3ZnPg==');
        }

        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 18px;
            position: relative;
            animation: messageAppear 0.3s ease;
            word-wrap: break-word;
        }

        @media (min-width: 768px) {
            .message {
                max-width: 60%;
            }
        }

        @keyframes messageAppear {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.incoming {
            background: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.outgoing {
            background: var(--message-out);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message-sender {
            font-weight: 600;
            font-size: 11px;
            color: var(--primary);
            margin-bottom: 3px;
        }

        .message-text {
            font-size: 14px;
            line-height: 1.4;
            color: var(--text);
        }

        .message-meta {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 4px;
            font-size: 9px;
            color: var(--text-light);
            justify-content: flex-end;
        }

        .input-area {
            padding: 12px 16px;
            background: white;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-wrapper {
            flex: 1;
            background: var(--hover);
            border-radius: 25px;
            padding: 4px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 0;
            font-size: 14px;
            outline: none;
            min-width: 0;
        }

        .input-wrapper input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: scale(1.05);
        }

        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        #callContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            display: none;
        }

        #callContainer > div {
            position: relative;
            width: 100%;
            height: 100%;
        }

        #remoteVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .local-video-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 120px;
            height: 160px;
            border: 2px solid white;
            border-radius: 10px;
            overflow: hidden;
            background: #1a1a1a;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        @media (min-width: 768px) {
            .local-video-container {
                width: 150px;
                height: 200px;
            }
        }

        .local-video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .call-controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 10001;
        }

        .call-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        @media (min-width: 768px) {
            .call-btn {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }
        }

        .call-btn:hover {
            transform: scale(1.1);
        }

        .call-btn.mute {
            background: var(--success);
        }

        .call-btn.video {
            background: var(--secondary);
        }

        .call-btn.end {
            background: var(--danger);
        }

        .call-info {
            position: absolute;
            top: 30px;
            left: 20px;
            color: white;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
            z-index: 10001;
        }

        .call-info h2 {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .call-info p {
            font-size: 14px;
            opacity: 0.9;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            left: 20px;
            background: var(--primary);
            color: white;
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(150%);
            transition: transform 0.3s;
            z-index: 11000;
            max-width: 350px;
            margin: 0 auto;
        }

        @media (min-width: 768px) {
            .notification {
                left: auto;
                width: auto;
                min-width: 300px;
            }
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.error {
            background: var(--danger);
        }

        .notification.success {
            background: var(--success);
        }

        .notification.warning {
            background: var(--warning);
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: var(--hover);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--text-light);
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="top-bar">
            <div class="logo">
                <i class="fas fa-leaf"></i>
                <h1>Limongram</h1>
            </div>
            <div class="online-status" id="connectionStatus">
                <span class="online-dot"></span>
                <span>Подключение...</span>
            </div>
        </div>

        <div class="auth-screen" id="authScreen">
            <div class="auth-card">
                <i class="fas fa-lock"></i>
                <h2>Добро пожаловать</h2>
                <p>Защищенный мессенджер с end-to-end шифрованием</p>
                <input type="text" class="auth-input" id="username" placeholder="Ваше имя" autocomplete="off">
                <button class="auth-btn" onclick="connect()">
                    <i class="fas fa-sign-in-alt"></i>
                    Войти
                </button>
                <div style="margin-top: 20px; font-size: 11px; color: #999;" id="serverInfo"></div>
            </div>
        </div>

        <div class="main-screen" id="mainScreen" style="display: none;">
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <div class="user-profile">
                        <div class="avatar" id="userAvatar"></div>
                        <div class="user-info">
                            <h4 id="userName"></h4>
                            <p><i class="fas fa-circle" style="color: #4ade80; font-size: 6px;"></i> В сети</p>
                        </div>
                    </div>
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchChats" placeholder="Поиск...">
                    </div>
                </div>
                <div class="chat-list" id="userList"></div>
            </div>

            <div class="chat-area">
                <div class="chat-header">
                    <button class="menu-toggle" onclick="toggleSidebar()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="chat-header-info" id="chatHeader">
                        <div class="chat-header-avatar" id="chatAvatar">👤</div>
                        <div class="chat-header-text">
                            <h3 id="chatName">Выберите чат</h3>
                            <p id="chatStatus"><i class="fas fa-lock"></i> Защищено</p>
                        </div>
                    </div>
                    <div class="chat-actions">
                        <button class="action-btn" onclick="startVideoCall()" title="Видеозвонок" id="videoCallBtn">
                            <i class="fas fa-video"></i>
                        </button>
                        <button class="action-btn" onclick="startAudioCall()" title="Аудиозвонок" id="audioCallBtn">
                            <i class="fas fa-phone"></i>
                        </button>
                        <button class="action-btn" onclick="toggleMute()" title="Микрофон" style="display: none;" id="muteBtn">
                            <i class="fas fa-microphone"></i>
                        </button>
                        <button class="action-btn" onclick="endCall()" title="Завершить" style="display: none;" id="endCallBtn">
                            <i class="fas fa-phone-slash" style="color: var(--danger);"></i>
                        </button>
                    </div>
                </div>

                <div class="messages-container" id="messages"></div>

                <div class="input-area">
                    <div class="input-wrapper">
                        <input type="text" id="messageInput" placeholder="Сообщение..." disabled>
                    </div>
                    <button class="send-btn" onclick="sendMessage()" id="sendButton" disabled>
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="callContainer">
        <div>
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="local-video-container">
                <video id="localVideo" autoplay playsinline muted></video>
            </div>
            <div class="call-controls">
                <button class="call-btn mute" onclick="toggleMute()">
                    <i class="fas fa-microphone"></i>
                </button>
                <button class="call-btn video" onclick="toggleCamera()">
                    <i class="fas fa-video"></i>
                </button>
                <button class="call-btn end" onclick="endCall()">
                    <i class="fas fa-phone-slash"></i>
                </button>
            </div>
            <div class="call-info">
                <h2 id="callStatus">Звонок...</h2>
                <p id="callPartner"></p>
            </div>
        </div>
    </div>

    <div class="notification" id="notification">
        <i class="fas fa-bell"></i>
        <span id="notificationText">Уведомление</span>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script>
        // ========== КОНФИГУРАЦИЯ ==========
        // Автоматическое определение URL сервера
        const SERVER_URL = (() => {
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                return "ws://localhost:8000";
            }
            return "wss://limongram-messenger.onrender.com";
        })();

        // Показываем информацию о сервере
        document.getElementById('serverInfo').innerHTML = `🖥️ Сервер: ${SERVER_URL}`;

        // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
        let ws = null;
        let myName = "";
        let currentChat = null;
        let myKey = null;
        let peerKeys = {};
        let onlineUsers = [];
        let keyExchangeAttempts = 0;
        const MAX_KEY_ATTEMPTS = 3;
        
        // Переменные для звонков
        let peerConnection = null;
        let localStream = null;
        let remoteStream = null;
        let currentCall = null;
        let isMuted = false;
        let isVideoEnabled = true;
        let callTimeout = null;
        
        // STUN серверы
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' }
            ]
        };

        // ========== ФУНКЦИИ ДЛЯ УВЕДОМЛЕНИЙ ==========
        function showNotification(text, type = 'info') {
            const notification = document.getElementById('notification');
            const notificationText = document.getElementById('notificationText');
            
            notificationText.textContent = text;
            notification.className = 'notification';
            
            if (type === 'error') {
                notification.classList.add('error');
            } else if (type === 'success') {
                notification.classList.add('success');
            } else if (type === 'warning') {
                notification.classList.add('warning');
            }
            
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        // ========== ФУНКЦИИ ДЛЯ КЛЮЧЕЙ ШИФРОВАНИЯ ==========
        function generateEncryptionKey() {
            return CryptoJS.lib.WordArray.random(32).toString();
        }

        function broadcastMyKey() {
            if (!ws || ws.readyState !== WebSocket.OPEN) return false;
            
            ws.send(JSON.stringify({
                type: "key_exchange",
                key: myKey
            }));
            
            console.log("🔑 Ключ отправлен всем пользователям");
            return true;
        }

        function sendKeyToUser(username) {
            if (!ws || ws.readyState !== WebSocket.OPEN) return false;
            
            ws.send(JSON.stringify({
                type: "key_exchange",
                to: username,
                key: myKey
            }));
            
            console.log(`🔑 Ключ отправлен пользователю ${username}`);
            return true;
        }

        function requestKeyFromUser(username) {
            if (!ws || ws.readyState !== WebSocket.OPEN) return false;
            
            ws.send(JSON.stringify({
                type: "key_request",
                to: username
            }));
            
            console.log(`🔑 Запрос ключа у ${username}`);
            return true;
        }

        function checkAllKeys() {
            const otherUsers = onlineUsers.filter(u => u !== myName);
            const missingKeys = otherUsers.filter(u => !peerKeys[u]);
            
            if (missingKeys.length > 0) {
                console.log(`⚠️ Отсутствуют ключи для: ${missingKeys.join(', ')}`);
                missingKeys.forEach(user => {
                    requestKeyFromUser(user);
                });
                return false;
            }
            
            console.log("✅ Все ключи получены");
            return true;
        }

        function retryKeyExchange() {
            if (keyExchangeAttempts >= MAX_KEY_ATTEMPTS) {
                console.log("❌ Достигнут лимит попыток обмена ключами");
                showNotification("⚠️ Проблема с ключами шифрования", 'warning');
                return;
            }
            
            keyExchangeAttempts++;
            console.log(`🔄 Попытка обмена ключами #${keyExchangeAttempts}`);
            
            broadcastMyKey();
            
            setTimeout(() => {
                if (!checkAllKeys()) {
                    retryKeyExchange();
                }
            }, 1000);
        }

        // ========== ПОДКЛЮЧЕНИЕ К СЕРВЕРУ ==========
        function connect() {
            myName = document.getElementById('username').value.trim();
            
            if (!myName) {
                showNotification('Введите имя!', 'error');
                return;
            }

            myKey = generateEncryptionKey();
            console.log("🔑 Сгенерирован ключ:", myKey);

            document.getElementById('connectionStatus').innerHTML = `
                <span class="online-dot"></span>
                <span>Подключение...</span>
            `;

            try {
                ws = new WebSocket(`${SERVER_URL}/ws/${myName}`);

                ws.onopen = () => {
                    console.log('✅ Подключено к серверу');
                    
                    keyExchangeAttempts = 0;
                    
                    setTimeout(() => {
                        broadcastMyKey();
                    }, 500);
                    
                    document.getElementById('authScreen').style.display = 'none';
                    document.getElementById('mainScreen').style.display = 'flex';
                    
                    document.getElementById('userAvatar').textContent = myName.charAt(0).toUpperCase();
                    document.getElementById('userName').textContent = myName;

                    document.getElementById('connectionStatus').innerHTML = `
                        <span class="online-dot"></span>
                        <span>${myName}</span>
                    `;

                    showNotification(`✅ Добро пожаловать, ${myName}!`, 'success');
                };

                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    console.log('📨 Получено:', data.type, data.from || '');

                    if (data.type === 'user_list') {
                        onlineUsers = data.users;
                        updateUserList(data.users);
                        
                        setTimeout(() => {
                            checkAllKeys();
                        }, 500);
                    }
                    else if (data.type === 'key_exchange') {
                        peerKeys[data.from] = data.key;
                        console.log(`🔑 Получен ключ от ${data.from}`);
                        
                        updateUserList(onlineUsers);
                        
                        if (!peerKeys[myName]) {
                            sendKeyToUser(data.from);
                        }
                        
                        checkAllKeys();
                        
                        // Если это текущий чат, обновляем статус
                        if (currentChat === data.from) {
                            updateChatStatus();
                        }
                    }
                    else if (data.type === 'key_request') {
                        console.log(`🔑 Запрос ключа от ${data.from}`);
                        sendKeyToUser(data.from);
                    }
                    else if (data.type === 'key_exchange_ack') {
                        console.log('✅ Ключ доставлен');
                    }
                    else if (data.type === 'encrypted') {
                        try {
                            const decrypted = CryptoJS.AES.decrypt(
                                data.data.ciphertext,
                                myKey,
                                { iv: CryptoJS.enc.Hex.parse(data.data.iv) }
                            ).toString(CryptoJS.enc.Utf8);

                            if (decrypted) {
                                addMessage(data.from, decrypted, true);
                                updateLastMessage(data.from, decrypted);
                            }
                        } catch (e) {
                            console.error('❌ Ошибка расшифровки:', e);
                            
                            if (peerKeys[data.from]) {
                                delete peerKeys[data.from];
                                requestKeyFromUser(data.from);
                                showNotification('⚠️ Ошибка ключа, запрашиваю новый', 'warning');
                            }
                        }
                    }
                    else if (data.type === 'call_offer') {
                        handleIncomingCall(data.caller, data.offer, data.call_id);
                    }
                    else if (data.type === 'call_answer') {
                        handleCallAnswer(data.answer, data.call_id);
                    }
                    else if (data.type === 'ice_candidate') {
                        handleIceCandidate(data.candidate, data.call_id);
                    }
                    else if (data.type === 'end_call') {
                        handleCallEnd();
                    }
                };

                ws.onclose = () => {
                    document.getElementById('connectionStatus').innerHTML = `
                        <span style="color: #f87171;">●</span> Отключено
                    `;
                    showNotification('❌ Соединение потеряно', 'error');
                    
                    peerKeys = {};
                    
                    setTimeout(() => {
                        if (myName) {
                            connect();
                        }
                    }, 3000);
                };

                ws.onerror = (error) => {
                    console.error('❌ Ошибка WebSocket:', error);
                    showNotification('❌ Ошибка соединения', 'error');
                };

            } catch (error) {
                console.error('Connection error:', error);
                showNotification('❌ Не удалось подключиться', 'error');
            }
        }

        // ========== УПРАВЛЕНИЕ ПОЛЬЗОВАТЕЛЯМИ ==========
        function updateUserList(users) {
            const userList = document.getElementById('userList');
            userList.innerHTML = '';

            const otherUsers = users.filter(u => u !== myName);

            if (otherUsers.length === 0) {
                userList.innerHTML = `
                    <div style="text-align: center; padding: 30px; color: var(--text-light);">
                        <i class="fas fa-users" style="font-size: 30px; opacity: 0.5;"></i>
                        <p>Нет пользователей в сети</p>
                    </div>
                `;
                return;
            }

            otherUsers.forEach(user => {
                const hasKey = peerKeys[user];
                
                const div = document.createElement('div');
                div.className = `chat-item ${currentChat === user ? 'active' : ''}`;
                div.onclick = () => selectChat(user);
                
                div.innerHTML = `
                    <div class="chat-avatar online">${user.charAt(0).toUpperCase()}</div>
                    <div class="chat-info">
                        <div class="chat-name">
                            ${user}
                            ${hasKey ? '<i class="fas fa-lock"></i>' : '<i class="fas fa-exclamation-triangle"></i>'}
                        </div>
                        <div class="chat-preview" id="preview-${user}">
                            ${hasKey ? 'Защищено' : 'Нет ключа'}
                        </div>
                    </div>
                    <div class="chat-time" id="time-${user}"></div>
                `;
                
                userList.appendChild(div);
            });
        }

        function selectChat(user) {
            currentChat = user;
            
            document.getElementById('chatAvatar').textContent = user.charAt(0).toUpperCase();
            document.getElementById('chatName').textContent = user;
            
            updateChatStatus();
            
            document.querySelectorAll('.chat-item').forEach(item => {
                item.classList.remove('active');
                if (item.querySelector('.chat-name').textContent.trim() === user) {
                    item.classList.add('active');
                }
            });

            if (window.innerWidth < 768) {
                document.getElementById('sidebar').classList.remove('active');
            }
        }

        function updateChatStatus() {
            const hasKey = peerKeys[currentChat];
            
            if (hasKey) {
                document.getElementById('chatStatus').innerHTML = '<i class="fas fa-lock" style="color: var(--success);"></i> Защищено';
                document.getElementById('messageInput').disabled = false;
                document.getElementById('sendButton').disabled = false;
                document.getElementById('videoCallBtn').disabled = false;
                document.getElementById('audioCallBtn').disabled = false;
            } else {
                document.getElementById('chatStatus').innerHTML = '<i class="fas fa-exclamation-triangle" style="color: var(--warning);"></i> Нет ключа шифрования';
                document.getElementById('messageInput').disabled = true;
                document.getElementById('sendButton').disabled = true;
                document.getElementById('videoCallBtn').disabled = true;
                document.getElementById('audioCallBtn').disabled = true;
                
                requestKeyFromUser(currentChat);
            }
        }

        function updateLastMessage(user, text) {
            const preview = document.getElementById(`preview-${user}`);
            const time = document.getElementById(`time-${user}`);
            
            if (preview) {
                preview.textContent = text.length > 25 ? text.substring(0, 25) + '...' : text;
            }
            if (time) {
                const now = new Date();
                time.textContent = now.getHours().toString().padStart(2,'0') + ':' + 
                                 now.getMinutes().toString().padStart(2,'0');
            }
        }

        // ========== ОТПРАВКА СООБЩЕНИЙ ==========
        function sendMessage() {
            if (!currentChat) {
                showNotification('Выберите собеседника!', 'error');
                return;
            }

            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            const peerKey = peerKeys[currentChat];
            if (!peerKey) {
                showNotification('⌛ Нет ключа шифрования!', 'warning');
                requestKeyFromUser(currentChat);
                return;
            }

            try {
                const iv = CryptoJS.lib.WordArray.random(16);
                const encrypted = CryptoJS.AES.encrypt(message, peerKey, {
                    iv: iv,
                    mode: CryptoJS.mode.CBC,
                    padding: CryptoJS.pad.Pkcs7
                });

                ws.send(JSON.stringify({
                    type: "encrypted",
                    to: currentChat,
                    data: {
                        ciphertext: encrypted.toString(),
                        iv: iv.toString()
                    }
                }));

                addMessage(`Вы`, message, false);
                updateLastMessage(currentChat, message);
                
                input.value = '';
            } catch (error) {
                console.error('Ошибка шифрования:', error);
                showNotification('❌ Ошибка шифрования', 'error');
            }
        }

        function addMessage(sender, text, incoming) {
            const messages = document.getElementById('messages');
            
            const div = document.createElement('div');
            div.className = `message ${incoming ? 'incoming' : 'outgoing'}`;
            
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            div.innerHTML = `
                ${incoming ? `<div class="message-sender">${sender}</div>` : ''}
                <div class="message-text">${escapeHtml(text)}</div>
                <div class="message-meta">
                    ${time} <i class="fas fa-lock"></i>
                </div>
            `;
            
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========== ФУНКЦИИ ЗВОНКОВ ==========
        async function startVideoCall() {
            if (!currentChat) {
                showNotification('Выберите собеседника!', 'error');
                return;
            }
            
            if (!peerKeys[currentChat]) {
                showNotification('⌛ Нет ключа шифрования!', 'warning');
                return;
            }
            
            try {
                showNotification('📹 Запрашиваю камеру...', 'info');
                
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: true, 
                    audio: true 
                });
                
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('callContainer').style.display = 'block';
                document.getElementById('callPartner').textContent = currentChat;
                document.getElementById('callStatus').innerHTML = '⏳ Звонок...';
                
                document.getElementById('muteBtn').style.display = 'inline-flex';
                document.getElementById('endCallBtn').style.display = 'inline-flex';
                
                peerConnection = new RTCPeerConnection(configuration);
                
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
                
                peerConnection.ontrack = (event) => {
                    remoteStream = event.streams[0];
                    document.getElementById('remoteVideo').srcObject = remoteStream;
                    document.getElementById('callStatus').innerHTML = '📞 В разговоре';
                };
                
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate && ws?.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({
                            type: "ice_candidate",
                            to: currentChat,
                            candidate: event.candidate,
                            call_id: currentCall
                        }));
                    }
                };
                
                const offer = await peerConnection.createOffer({
                    offerToReceiveAudio: true,
                    offerToReceiveVideo: true
                });
                await peerConnection.setLocalDescription(offer);
                
                currentCall = Date.now().toString();
                
                ws.send(JSON.stringify({
                    type: "call_offer",
                    to: currentChat,
                    offer: peerConnection.localDescription,
                    caller: myName,
                    call_id: currentCall
                }));
                
                callTimeout = setTimeout(() => {
                    if (currentCall) {
                        showNotification('⏰ Собеседник не отвечает', 'warning');
                        endCall();
                    }
                }, 30000);
                
            } catch (error) {
                console.error('Ошибка:', error);
                showNotification('❌ Нет доступа к камере', 'error');
                endCall();
            }
        }

        async function startAudioCall() {
            if (!currentChat) {
                showNotification('Выберите собеседника!', 'error');
                return;
            }
            
            if (!peerKeys[currentChat]) {
                showNotification('⌛ Нет ключа шифрования!', 'warning');
                return;
            }
            
            try {
                showNotification('🎤 Запрашиваю микрофон...', 'info');
                
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: false, 
                    audio: true 
                });
                
                document.getElementById('callContainer').style.display = 'block';
                document.getElementById('callPartner').textContent = currentChat;
                document.getElementById('callStatus').innerHTML = '⏳ Аудиозвонок...';
                
                document.querySelector('.local-video-container').style.display = 'none';
                
                document.getElementById('muteBtn').style.display = 'inline-flex';
                document.getElementById('endCallBtn').style.display = 'inline-flex';
                
                peerConnection = new RTCPeerConnection(configuration);
                
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
                
                peerConnection.ontrack = (event) => {
                    remoteStream = event.streams[0];
                    document.getElementById('callStatus').innerHTML = '📞 В разговоре';
                };
                
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate && ws?.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({
                            type: "ice_candidate",
                            to: currentChat,
                            candidate: event.candidate,
                            call_id: currentCall
                        }));
                    }
                };
                
                const offer = await peerConnection.createOffer({
                    offerToReceiveAudio: true,
                    offerToReceiveVideo: false
                });
                await peerConnection.setLocalDescription(offer);
                
                currentCall = Date.now().toString();
                
                ws.send(JSON.stringify({
                    type: "call_offer",
                    to: currentChat,
                    offer: peerConnection.localDescription,
                    caller: myName,
                    call_id: currentCall
                }));
                
                callTimeout = setTimeout(() => {
                    if (currentCall) {
                        showNotification('⏰ Собеседник не отвечает', 'warning');
                        endCall();
                    }
                }, 30000);
                
            } catch (error) {
                console.error('Ошибка:', error);
                showNotification('❌ Нет доступа к микрофону', 'error');
                endCall();
            }
        }

        function handleIncomingCall(caller, offer, callId) {
            if (currentCall) {
                ws.send(JSON.stringify({
                    type: "end_call",
                    to: caller,
                    call_id: callId
                }));
                return;
            }
            
            if (confirm(`📞 Входящий звонок от ${caller}! Принять?`)) {
                acceptCall(offer, caller, callId);
            } else {
                ws.send(JSON.stringify({
                    type: "end_call",
                    to: caller,
                    call_id: callId
                }));
            }
        }

        async function acceptCall(offer, caller, callId) {
            try {
                currentCall = callId;
                
                if (!localStream) {
                    localStream = await navigator.mediaDevices.getUserMedia({ 
                        video: true, 
                        audio: true 
                    });
                }
                
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('callContainer').style.display = 'block';
                document.getElementById('callPartner').textContent = caller;
                document.getElementById('callStatus').innerHTML = '📞 Принятие...';
                
                document.querySelector('.local-video-container').style.display = 'block';
                document.getElementById('muteBtn').style.display = 'inline-flex';
                document.getElementById('endCallBtn').style.display = 'inline-flex';
                
                peerConnection = new RTCPeerConnection(configuration);
                
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
                
                peerConnection.ontrack = (event) => {
                    remoteStream = event.streams[0];
                    document.getElementById('remoteVideo').srcObject = remoteStream;
                    document.getElementById('callStatus').innerHTML = '📞 В разговоре';
                };
                
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate && ws?.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({
                            type: "ice_candidate",
                            to: caller,
                            candidate: event.candidate,
                            call_id: currentCall
                        }));
                    }
                };
                
                await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                
                ws.send(JSON.stringify({
                    type: "call_answer",
                    to: caller,
                    answer: peerConnection.localDescription,
                    call_id: currentCall
                }));
                
                if (callTimeout) {
                    clearTimeout(callTimeout);
                    callTimeout = null;
                }
                
            } catch (error) {
                console.error('Ошибка:', error);
                showNotification('❌ Ошибка приема звонка', 'error');
                endCall();
            }
        }

        function handleCallAnswer(answer, callId) {
            if (peerConnection && currentCall === callId) {
                peerConnection.setRemoteDescription(new RTCSessionDescription(answer))
                    .then(() => {
                        document.getElementById('callStatus').innerHTML = '📞 В разговоре';
                        if (callTimeout) {
                            clearTimeout(callTimeout);
                            callTimeout = null;
                        }
                    })
                    .catch(error => console.error('Error setting remote description:', error));
            }
        }

        function handleIceCandidate(candidate, callId) {
            if (peerConnection && currentCall === callId) {
                peerConnection.addIceCandidate(new RTCIceCandidate(candidate))
                    .catch(error => console.error('Error adding ICE candidate:', error));
            }
        }

        function handleCallEnd() {
            endCall();
            showNotification('📞 Звонок завершен', 'info');
        }

        function endCall() {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            
            if (remoteStream) {
                remoteStream.getTracks().forEach(track => track.stop());
                remoteStream = null;
            }
            
            document.getElementById('callContainer').style.display = 'none';
            document.getElementById('muteBtn').style.display = 'none';
            document.getElementById('endCallBtn').style.display = 'none';
            
            document.querySelector('.local-video-container').style.display = 'block';
            
            if (callTimeout) {
                clearTimeout(callTimeout);
                callTimeout = null;
            }
            
            if (currentCall && ws?.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: "end_call",
                    to: currentChat,
                    call_id: currentCall
                }));
            }
            
            currentCall = null;
        }

        function toggleMute() {
            if (localStream) {
                isMuted = !isMuted;
                localStream.getAudioTracks().forEach(track => {
                    track.enabled = !isMuted;
                });
                
                const icons = document.querySelectorAll('.fa-microphone, .fa-microphone-slash');
                icons.forEach(icon => {
                    icon.className = isMuted ? 'fas fa-microphone-slash' : 'fas fa-microphone';
                });
            }
        }

        function toggleCamera() {
            if (localStream) {
                isVideoEnabled = !isVideoEnabled;
                localStream.getVideoTracks().forEach(track => {
                    track.enabled = isVideoEnabled;
                });
                
                const cameraBtn = document.querySelector('.call-btn.video i');
                if (cameraBtn) {
                    cameraBtn.className = isVideoEnabled ? 'fas fa-video' : 'fas fa-video-slash';
                }
            }
        }

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('username').focus();
            
            document.getElementById('username').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') connect();
            });
            
            document.getElementById('messageInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            
            document.getElementById('searchChats').addEventListener('input', (e) => {
                const search = e.target.value.toLowerCase();
                document.querySelectorAll('.chat-item').forEach(item => {
                    const name = item.querySelector('.chat-name').textContent.toLowerCase();
                    item.style.display = name.includes(search) ? 'flex' : 'none';
                });
            });
        });
    </script>
</body>
