<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Limongram 🍋</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 40px auto; padding: 20px; }
        input, button { padding: 12px; font-size: 16px; margin: 5px; }
        button { background: #25D366; color: white; border: none; cursor: pointer; }
        #chat { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; margin: 20px 0; }
        .message { margin: 10px 0; padding: 10px; border-radius: 10px; max-width: 80%; }
        .incoming { background: #f0f0f0; }
        .outgoing { background: #dcf8c6; margin-left: auto; }
    </style>
</head>
<body>
    <h1>🍋 Limongram Public Messenger</h1>
    
    <div>
        <input type="text" id="username" placeholder="Ваше имя">
        <button onclick="connect()">Подключиться</button>
    </div>
    
    <div id="chat">
        <div style="text-align: center; color: #666; margin-top: 50px;">
            Введите имя и нажмите "Подключиться"
        </div>
    </div>
    
    <div>
        <input type="text" id="messageInput" placeholder="Сообщение" disabled>
        <input type="text" id="receiver" placeholder="Кому" disabled>
        <button onclick="send()" disabled>Отправить</button>
    </div>

    <script>
        let ws = null;
        let myName = "";
        const SERVER_URL = "wss://limongram-messenger.limongram.repl.co"; // ИЛИ wss://limongram-test.onrender.com
        
        function connect() {
            myName = document.getElementById('username').value.trim();
            if (!myName) {
                alert('Введите имя!');
                return;
            }
            
            ws = new WebSocket(`${SERVER_URL}/ws/${myName}`);
            
            ws.onopen = function() {
                console.log('✅ Подключено к публичному серверу');
                document.getElementById('username').disabled = true;
                document.querySelector('button[onclick="connect()"]').disabled = true;
                document.getElementById('messageInput').disabled = false;
                document.getElementById('receiver').disabled = false;
                document.querySelector('button[onclick="send()"]').disabled = false;
                
                alert(`✅ Подключено как ${myName}\nСервер: ${SERVER_URL}`);
            };
            
            ws.onmessage = function(event) {
                console.log('📨 Получено:', event.data);
                try {
                    const data = JSON.parse(event.data);
                    
                    if (data.type === 'message') {
                        addMessage(data.from, data.message, true);
                    }
                    
                } catch (e) {
                    console.error('Ошибка:', e);
                }
            };
            
            ws.onerror = function(error) {
                console.error('❌ Ошибка:', error);
                alert('❌ Ошибка подключения к серверу');
            };
        }
        
        function send() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert('Нет подключения!');
                return;
            }
            
            const message = document.getElementById('messageInput').value;
            const receiver = document.getElementById('receiver').value;
            
            if (!message || !receiver) {
                alert('Введите сообщение и получателя!');
                return;
            }
            
            ws.send(JSON.stringify({
                to: receiver,
                message: message
            }));
            
            addMessage('Вы → ' + receiver, message, false);
            
            document.getElementById('messageInput').value = '';
            document.getElementById('receiver').value = '';
        }
        
        function addMessage(sender, text, incoming) {
            const chat = document.getElementById('chat');
            
            if (chat.children.length === 1 && chat.children[0].style.textAlign === 'center') {
                chat.innerHTML = '';
            }
            
            const div = document.createElement('div');
            div.className = `message ${incoming ? 'incoming' : 'outgoing'}`;
            div.innerHTML = `<strong>${sender}:</strong> ${text}`;
            chat.appendChild(div);
            
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
    
    <div style="margin-top: 30px; font-size: 12px; color: #666; text-align: center;">
        <p>Limongram Messenger 🍋 | Публичный сервер: ${SERVER_URL}</p>
        <p>Отправьте этот файл другу для общения!</p>
    </div>
</body>
</html>
