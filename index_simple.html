<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Limongram 🍋</title>
    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }
        
        input, button {
            padding: 12px;
            font-size: 16px;
            margin: 5px;
        }
        
        button {
            background: #25D366;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        
        button:hover {
            background: #128C7E;
        }
        
        #chat {
            border: 1px solid #ccc;
            height: 300px;
            overflow-y: auto;
            padding: 10px;
            margin: 20px 0;
        }
        
        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 80%;
        }
        
        .incoming {
            background: #f0f0f0;
        }
        
        .outgoing {
            background: #dcf8c6;
            margin-left: auto;
        }
    </style>
</head>
<body>
    <h1>🍋 Limongram Simple</h1>
    
    <div>
        <input type="text" id="username" placeholder="Ваше имя">
        <button onclick="connect()">Подключиться</button>
    </div>
    
    <div id="chat">
        <div style="text-align: center; color: #666; margin-top: 50px;">
            Введите имя и нажмите "Подключиться"
        </div>
    </div>
    
    <div>
        <input type="text" id="messageInput" placeholder="Сообщение" disabled>
        <input type="text" id="receiver" placeholder="Кому" disabled>
        <button onclick="send()" disabled>Отправить</button>
    </div>

    <script>
        let ws = null;
        let myName = "";
        
        function connect() {
            myName = document.getElementById('username').value.trim();
            if (!myName) {
                alert('Введите имя!');
                return;
            }
            
            ws = new WebSocket(`wss://limongram-messenger.limongram.repl.co/ws/${myName}`);
            
            ws.onopen = function() {
                console.log('✅ Подключено');
                document.getElementById('username').disabled = true;
                document.querySelector('button[onclick="connect()"]').disabled = true;
                document.getElementById('messageInput').disabled = false;
                document.getElementById('receiver').disabled = false;
                document.querySelector('button[onclick="send()"]').disabled = false;
                
                alert('Подключено как ' + myName);
            };
            
            ws.onmessage = function(event) {
                console.log('📨 Получено:', event.data);
                try {
                    const data = JSON.parse(event.data);
                    
                    if (data.type === 'message') {
                        // Сообщение от другого пользователя
                        addMessage(data.from, data.message, true);
                    }
                    else if (data.type === 'system') {
                        // Системное сообщение
                        console.log('Система:', data.message);
                        if (data.users) {
                            updateOnlineUsers(data.users);
                        }
                    }
                    
                } catch (e) {
                    console.error('Ошибка:', e);
                }
            };
            
            ws.onerror = function(error) {
                console.error('❌ Ошибка:', error);
                alert('Ошибка подключения');
            };
        }
        
        function send() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert('Нет подключения!');
                return;
            }
            
            const message = document.getElementById('messageInput').value;
            const receiver = document.getElementById('receiver').value;
            
            if (!message || !receiver) {
                alert('Введите сообщение и получателя!');
                return;
            }
            
            ws.send(JSON.stringify({
                to: receiver,
                message: message
            }));
            
            // Показываем свое сообщение
            addMessage('Вы → ' + receiver, message, false);
            
            // Очищаем поля
            document.getElementById('messageInput').value = '';
            document.getElementById('receiver').value = '';
        }
        
        function addMessage(sender, text, incoming) {
            const chat = document.getElementById('chat');
            
            // Если это первое сообщение, очищаем приветствие
            if (chat.children.length === 1 && chat.children[0].style.textAlign === 'center') {
                chat.innerHTML = '';
            }
            
            const div = document.createElement('div');
            div.className = `message ${incoming ? 'incoming' : 'outgoing'}`;
            div.innerHTML = `<strong>${sender}:</strong> ${text}`;
            chat.appendChild(div);
            
            // Прокручиваем вниз
            chat.scrollTop = chat.scrollHeight;
        }
        
        function updateOnlineUsers(users) {
            console.log('Онлайн:', users.filter(u => u !== myName));
        }
    </script>
</body>
</html>
